general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

listener {
    timeout = 30                                             # 0.5min
    on-timeout = brightnessctl -s set 10                     # dim screen
    on-resume = brightnessctl -r                             # restore brightness
}

listener {
    timeout = 120                                            # 2min
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0  # save and turn off keyboard backlight
    on-resume = brightnessctl -rd '*::kbd_backlight'         # restore keyboard backlight
}

listener {
    timeout = 150                      # 2.5min
    on-timeout = loginctl lock-session # lock screen
}

listener {
    timeout = 270                                            # 4.5min (lock + 2min)
    on-timeout = hyprctl dispatch dpms off                   # screen off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r # screen on
}

listener {
    timeout = 600                                            # 10min
    on-timeout = systemctl suspend                           # suspend
}
